<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EasyMix Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2d8a4e;
      --green-light: #3ba563;
      --green-dark: #1f6b3a;
      --green-bg: rgba(45, 138, 78, 0.08);
      --dark: #111111;
      --white: #ffffff;
      --off-white: #f7f8fa;
      --gray-100: #f0f1f3;
      --gray-200: #e2e4e8;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Outfit', sans-serif;
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-text: var(--tg-theme-text-color, #111111);
      --tg-hint: var(--tg-theme-hint-color, #6b7280);
      --tg-section-bg: var(--tg-theme-secondary-bg-color, #f7f8fa);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--tg-section-bg);
      color: var(--tg-text);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 90px;
    }

    /* ======= HEADER ======= */
    .header {
      background: var(--dark);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo img { width: 30px; height: 30px; }
    .logo-text {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .logo-sub {
      font-size: 9px;
      color: var(--green-light);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-top: 1px;
    }
    .cart-btn {
      background: var(--green);
      border: none;
      border-radius: 50px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: white;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cart-btn:active { background: var(--green-dark); }
    .cart-count {
      background: white;
      color: var(--green-dark);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-count.hidden { display: none; }

    /* ======= SEARCH ======= */
    .search-wrap {
      padding: 12px 16px 4px;
      background: var(--dark);
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px 10px 38px;
      font-size: 14px;
      color: white;
      outline: none;
      font-family: var(--font-body);
    }
    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-wrap-inner {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 15px;
    }

    /* ======= CATEGORIES ======= */
    .cats-wrap {
      background: var(--dark);
      padding: 10px 0 14px;
    }
    .cats {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 16px;
      scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-btn.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    /* ======= PRODUCTS ======= */
    .products-section { padding: 14px 16px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .product-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .product-card:active { transform: scale(0.97); }
    .card-img-wrap {
      background: linear-gradient(135deg, #f0f4f0 0%, #e8f0e8 100%);
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .card-img-wrap img {
      height: 120px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    }
    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--green);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .card-body { padding: 10px 11px 11px; }
    .card-code {
      font-size: 10px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .card-name {
      font-family: var(--font-heading);
      font-size: 13.5px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.25;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 11px;
      color: var(--gray-500);
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-weight {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
    }
    .add-btn {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .add-btn:active { background: var(--green-dark); }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-btn {
      background: var(--gray-100);
      border: none;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
    }
    .qty-btn.minus { background: var(--gray-100); }
    .qty-num {
      font-size: 14px;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
      color: var(--dark);
    }

    /* ======= PRODUCT MODAL ======= */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .modal-img-wrap {
      background: linear-gradient(135deg, #f0f4f0, #e8f0e8);
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-img-wrap img {
      height: 170px;
      object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
    }
    .modal-content { padding: 20px 20px 24px; }
    .modal-badge {
      display: inline-block;
      background: var(--green-bg);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 8px;
    }
    .modal-name {
      font-family: var(--font-heading);
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .modal-desc {
      font-size: 13.5px;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .modal-specs-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-700);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .spec-item {
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }
    .spec-label { font-size: 10px; color: var(--gray-500); margin-bottom: 2px; }
    .spec-val { font-size: 12.5px; font-weight: 600; color: var(--dark); }
    .modal-add-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-add-btn {
      flex: 1;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-add-btn:active { background: var(--green-dark); }

    /* ======= CART MODAL ======= */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      align-items: flex-end;
    }
    .cart-overlay.open { display: flex; }
    .cart-sheet {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .cart-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-title {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
    }
    .close-btn {
      background: var(--gray-100);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gray-700);
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .cart-item-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-item-code {
      font-size: 11px;
      color: var(--green);
      font-weight: 500;
      margin-top: 1px;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cqty-btn {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
    }
    .cqty-num {
      font-size: 14px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-500);
    }
    .cart-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .cart-empty-text { font-size: 15px; font-weight: 500; }
    .cart-footer {
      padding: 14px 16px 24px;
      border-top: 1px solid var(--gray-200);
    }
    .cart-total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cart-total-label { font-size: 14px; color: var(--gray-500); }
    .cart-total-items {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }
    .checkout-btn {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: var(--font-body);
    }
    .checkout-btn:active { background: var(--green-dark); }
    .checkout-btn:disabled { background: var(--gray-200); color: var(--gray-500); cursor: not-allowed; }

    /* ======= SUCCESS ======= */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    .success-overlay.open { display: flex; }
    .success-card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 320px;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 30px;
    }
    .success-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .success-text {
      font-size: 13.5px;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .success-close {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ======= BOTTOM NAV ======= */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      display: flex;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 99;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
      color: var(--gray-500);
      transition: color 0.2s;
      border: none;
      background: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--green); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* No results */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-500);
      grid-column: span 2;
    }
    .no-results-icon { font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="../images/easymix-emblem.svg" alt="EasyMix">
    <div>
      <span class="logo-text">EASYMIX</span>
      <span class="logo-sub">Строймагазин</span>
    </div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </button>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-wrap-inner">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" placeholder="Поиск продукта..." id="searchInput" oninput="filterProducts()">
  </div>
</div>

<!-- CATEGORIES -->
<div class="cats-wrap">
  <div class="cats" id="catsRow">
    <button class="cat-btn active" onclick="setCategory('all', this)">Все</button>
    <button class="cat-btn" onclick="setCategory('Плиточный клей', this)">Плиточный клей</button>
    <button class="cat-btn" onclick="setCategory('Затирка', this)">Затирка</button>
    <button class="cat-btn" onclick="setCategory('floor', this)">Полы и стяжка</button>
    <button class="cat-btn" onclick="setCategory('Штукатурка', this)">Штукатурка</button>
    <button class="cat-btn" onclick="setCategory('Шпаклёвка', this)">Шпаклёвка</button>
    <button class="cat-btn" onclick="setCategory('Универсальная смесь', this)">Универсальные</button>
    <button class="cat-btn" onclick="setCategory('Промышленная смесь', this)">Промышленные</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products-section">
  <div class="section-label" id="sectionLabel">Все продукты</div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal" onclick="closeProductModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-img-wrap">
      <img id="mImg" src="" alt="">
    </div>
    <div class="modal-content">
      <span class="modal-badge" id="mBadge"></span>
      <div class="modal-name" id="mName"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-specs-title">Характеристики</div>
      <div class="specs-grid" id="mSpecs"></div>
      <div class="modal-add-wrap">
        <button class="modal-add-btn" id="modalAddBtn" onclick="addFromModal()">
          Добавить в корзину
        </button>
      </div>
    </div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCartOutside(event)">
  <div class="cart-sheet">
    <div class="cart-header">
      <span class="cart-title">🛒 Корзина</span>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">Итого позиций:</span>
        <span class="cart-total-items" id="cartTotalItems">0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="sendOrder()">
        Отправить заявку
      </button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">Заявка отправлена!</div>
    <div class="success-text">Наш менеджер свяжется с вами в ближайшее время для уточнения деталей заказа.</div>
    <button class="success-close" onclick="closeSuccess()">Отлично!</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="navCatalog" onclick="showCatalog()">
    <span class="nav-icon">🏬</span>
    <span class="nav-label">Каталог</span>
  </button>
  <button class="nav-item" id="navCart" onclick="openCart()">
    <span class="nav-icon">🛒</span>
    <span class="nav-label">Корзина</span>
  </button>
  <button class="nav-item" id="navAbout" onclick="showAbout()">
    <span class="nav-icon">ℹ️</span>
    <span class="nav-label">О нас</span>
  </button>
</div>

<script>
// ─── Telegram Web App init ───────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#111111');
}

// ─── Products ────────────────────────────────────────────────────────────────
const products = [
  {

// floor categories helper
const floorCats = ['Цементный наливной пол', 'Гипсовый наливной пол', 'Стяжка'];

// ─── State ────────────────────────────────────────────────────────────────────
let cart = {};            // id → qty
let currentCat = 'all';
let currentModalId = null;

// ─── Render products ──────────────────────────────────────────────────────────
function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div>Ничего не найдено</div></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const qty = cart[p.id] || 0;
    return `
    <div class="product-card" onclick="openProduct('${p.id}')">
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.name}" onerror="this.style.opacity=0.3">
        <span class="card-badge">${p.code}</span>
      </div>
      <div class="card-body">
        <div class="card-code">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.shortDesc}</div>
        <div class="card-footer">
          <span class="card-weight">${p.weight}</span>
          ${qty === 0
            ? `<button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">+</button>`
            : `<div class="qty-controls" onclick="event.stopPropagation()">
                <button class="qty-btn minus" onclick="removeFromCart('${p.id}')">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="addToCart('${p.id}')">+</button>
               </div>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = products.filter(p => {
    if (currentCat === 'all') return true;
    if (currentCat === 'floor') return floorCats.includes(p.category);
    return p.category === currentCat;
  });
  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.code.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q) ||
    p.shortDesc.toLowerCase().includes(q)
  );
  renderProducts(list);
}

function setCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = {
    'all': 'Все продукты', 'Плиточный клей': 'Плиточный клей',
    'Затирка': 'Затирка', 'floor': 'Полы и стяжка',
    'Штукатурка': 'Штукатурки', 'Шпаклёвка': 'Шпаклёвки',
    'Универсальная смесь': 'Универсальные смеси', 'Промышленная смесь': 'Промышленные смеси'
  };
  document.getElementById('sectionLabel').textContent = labels[cat] || cat;
  filterProducts();
}

// ─── Cart logic ───────────────────────────────────────────────────────────────
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();
  filterProducts();
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function removeFromCart(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] === 0) delete cart[id];
  updateCartUI();
  filterProducts();
}

function updateCartUI() {
  const total = Object.values(cart).reduce((s, v) => s + v, 0);
  const el = document.getElementById('cartCount');
  el.textContent = total;
  el.classList.toggle('hidden', total === 0);
}

// ─── Product modal ────────────────────────────────────────────────────────────
function openProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentModalId = id;
  document.getElementById('mImg').src = p.img;
  document.getElementById('mBadge').textContent = p.category + ' · ' + p.code;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.description;
  document.getElementById('mSpecs').innerHTML = p.specs.map(([l, v]) =>
    `<div class="spec-item"><div class="spec-label">${l}</div><div class="spec-val">${v}</div></div>`
  ).join('');
  const qty = cart[id] || 0;
  const btn = document.getElementById('modalAddBtn');
  btn.textContent = qty > 0 ? `В корзине: ${qty} шт. (+)` : 'Добавить в корзину';
  document.getElementById('productModal').classList.add('open');
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function closeProductModal(e) {
  if (e.target === document.getElementById('productModal')) {
    document.getElementById('productModal').classList.remove('open');
  }
}

function addFromModal() {
  if (!currentModalId) return;
  addToCart(currentModalId);
  const qty = cart[currentModalId] || 0;
  document.getElementById('modalAddBtn').textContent = `В корзине: ${qty} шт. (+)`;
}

// ─── Cart sheet ───────────────────────────────────────────────────────────────
function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('open');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
}

function closeCartOutside(e) {
  if (e.target === document.getElementById('cartOverlay')) closeCart();
}

function renderCart() {
  const ids = Object.keys(cart);
  const total = ids.reduce((s, id) => s + cart[id], 0);
  document.getElementById('cartTotalItems').textContent = total + ' шт.';
  document.getElementById('checkoutBtn').disabled = ids.length === 0;

  if (!ids.length) {
    document.getElementById('cartItems').innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-text">Корзина пуста</div>
      </div>`;
    return;
  }

  document.getElementById('cartItems').innerHTML = ids.map(id => {
    const p = products.find(x => x.id === id);
    if (!p) return '';
    const qty = cart[id];
    return `
    <div class="cart-item">
      <img class="cart-item-img" src="${p.img}" alt="${p.name}" onerror="this.style.opacity=0.3">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-code">${p.code} · ${p.weight}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cqty-btn" onclick="cartChange('${id}', -1)">−</button>
        <span class="cqty-num">${qty}</span>
        <button class="cqty-btn" onclick="cartChange('${id}', 1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function cartChange(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartUI();
  filterProducts();
  renderCart();
}

// ─── Send order ───────────────────────────────────────────────────────────────
function sendOrder() {
  const ids = Object.keys(cart);
  if (!ids.length) return;

  const lines = ids.map(id => {
    const p = products.find(x => x.id === id);
    return `• ${p.name} (${p.code}) — ${cart[id]} мешк.`;
  });

  const orderText = '🏗 Заявка EasyMix\n\n' + lines.join('\n') + '\n\nИтого: ' +
    ids.reduce((s, id) => s + cart[id], 0) + ' мешков';

  if (tg && tg.sendData) {
    tg.sendData(JSON.stringify({ type: 'order', items: cart, text: orderText }));
  }

  // Reset
  cart = {};
  updateCartUI();
  filterProducts();
  closeCart();
  document.getElementById('successOverlay').classList.add('open');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('open');
}

      <button onclick="document.getElementById('aboutOverlay').classList.remove('open')" style="width:100%;background:#2d8a4e;color:white;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">Закрыть</button>
    </div>
  </div>`;
  div.onclick = e => { if (e.target === div) div.classList.remove('open'); };
  document.body.appendChild(div);
  document.getElementById('navAbout').classList.add('active');
  document.getElementById('navCatalog').classList.remove('active');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
filterProducts();
</script>
